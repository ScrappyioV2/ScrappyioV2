api:
  enabled: true
  address: 0.0.0.0:9001

sources:
  docker_host:
    type: docker_logs
    exclude_containers:
      - supabase-vector

sinks:
  logflare:
    type: "http"
    inputs:
      - docker_host
    uri: "http://analytics:4000/api/logs?source_name=docker_host&api_key=${LOGFLARE_API_KEY}"
    method: "post"
    encoding:
      codec: "json"
    request:
      retry_max_duration_secs: 10
    healthcheck:
      enabled: false
